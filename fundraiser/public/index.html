<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UL Industrial Design Donation Fundraiser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #fafafc;
    --border: rgba(0,0,0,0.08);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --blue-mid: #2196f3;
    --shadow-card: 0 8px 40px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--surface);
    border-radius: 28px;
    box-shadow: var(--shadow-card);
    padding: 48px 48px 44px;
    width: 100%;
    max-width: 520px;
    position: relative;
    border: 1px solid var(--border);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4facfe, #00b4d8);
  }
  .logo-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.4px;
    line-height: 1.25;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 14px;
  }
  .stat-raised {
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -1px;
    line-height: 1;
    transition: color 0.3s;
    display: inline-block;
    transform-origin: left center;
  }
  .stat-raised.flash { color: var(--blue-mid); }

  .raised-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
  }

  @keyframes goldenPop {
    0%   { transform: scale(1);    color: var(--text-primary); }
    15%  { transform: scale(1.18) rotate(-1.5deg); color: #f5a623; }
    30%  { transform: scale(1.22) rotate(1.5deg);  color: #f7c44e; }
    45%  { transform: scale(1.18) rotate(-1deg);   color: #f5a623; }
    60%  { transform: scale(1.20) rotate(0.8deg);  color: #f7c44e; }
    75%  { transform: scale(1.16) rotate(0deg);    color: #f5a623; }
    100% { transform: scale(1);    color: var(--text-primary); }
  }
  .stat-raised.golden {
    animation: goldenPop 0.9s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
  }
  .stat-goal { font-size: 14px; color: var(--text-tertiary); padding-bottom: 5px; }
  .stat-percent { font-size: 13px; color: var(--blue-mid); font-weight: 500; padding-bottom: 5px; text-align: right; }

  /* ── Progress bar ── */
  /* progress-outer is the positioning parent for the canvas */
  .progress-outer {
    position: relative;
    margin-bottom: 10px;
  }

  .progress-track {
    height: 14px;
    background: #e8e8ed;
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #4facfe 0%, #2196f3 55%, #00b4d8 100%);
    width: 0%;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, transparent 100%);
    border-radius: inherit;
  }

  @keyframes glowPulse {
    0%   { box-shadow: 0 0 6px rgba(79,172,254,0.4),  0 0 16px rgba(33,150,243,0.3); }
    40%  { box-shadow: 0 0 18px rgba(79,172,254,0.85), 0 0 40px rgba(33,150,243,0.55), 0 0 70px rgba(0,180,216,0.3); }
    100% { box-shadow: 0 0 4px rgba(79,172,254,0.2),  0 0 10px rgba(33,150,243,0.1); }
  }
  .progress-fill.glow { animation: glowPulse 1.6s ease forwards; }

  /* Canvas floats above the bar — positioned via JS */
  #confetti-canvas {
    position: absolute;
    left: 0;
    pointer-events: none;
    z-index: 100;
  }

  /* ── Donors ── */
  .donors-row { display: flex; margin-top: 14px; margin-bottom: 36px; }
  .donors-pill { display: flex; align-items: center; gap: 5px; background: #f0f4ff; border-radius: 999px; padding: 4px 10px 4px 8px; }
  .donors-dot { width: 6px; height: 6px; background: var(--blue-mid); border-radius: 50%; animation: breathe 2.4s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.55; transform: scale(0.75); }
  }
  .donors-text { font-size: 12px; color: var(--blue-mid); font-weight: 500; }

  .divider { height: 1px; background: var(--border); margin-bottom: 30px; }

  .input-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }

  .amount-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .preset-btn {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 11px 6px; font-size: 14px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; transition: all 0.18s ease; font-family: inherit;
  }
  .preset-btn:hover { background: #eef4ff; border-color: rgba(33,150,243,0.35); color: var(--blue-mid); }
  .preset-btn.active { background: linear-gradient(135deg,#eef4ff,#e3f0ff); border-color: var(--blue-mid); color: var(--blue-mid); }

  .custom-input-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .input-wrap { flex: 1; position: relative; }
  .currency-sign { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text-tertiary); font-weight: 500; pointer-events: none; }
  input[type="number"] {
    width: 100%; padding: 13px 14px 13px 28px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 15px; font-weight: 500; font-family: inherit;
    color: var(--text-primary); background: var(--surface2);
    outline: none; transition: border-color 0.18s, box-shadow 0.18s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(33,150,243,0.12); background: #fff; }

  /* ── Progress bar row with chart toggle ── */
  .progress-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-bar-row .progress-track {
    flex: 1;
  }
  .chart-toggle {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-tertiary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s ease;
    padding: 0;
  }
  .chart-toggle svg { width: 13px; height: 13px; }
  .chart-toggle:hover { background: #eef4ff; border-color: rgba(33,150,243,0.35); color: var(--blue-mid); }
  .chart-toggle.active { background: #eef4ff; border-color: var(--blue-mid); color: var(--blue-mid); }

  /* ── Chart dropdown panel ── */
  .chart-panel {
    overflow: hidden;
    height: 0;
    opacity: 0;
    transition: height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease;
  }
  .chart-panel.open {
    opacity: 1;
  }
  .chart-panel-inner {
    padding-top: 14px;
  }
  @keyframes chartFadeIn {
    0%   { opacity: 0; transform: translateY(18px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .chart-panel.open .chart-panel-inner {
    animation: chartFadeIn 0.55s cubic-bezier(0.34, 1.15, 0.64, 1) both;
  }
  #donation-chart {
    width: 100%;
    border-radius: 12px;
    display: block;
    background: var(--surface2);
  }
  .chart-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .chart-legend .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-right: 14px;
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .card-slide {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease;
  }
  .card-slide.open {
    max-height: 400px;
    opacity: 1;
  }
  .card-slide-inner {
    padding-top: 4px;
  }
  .card-section {
    margin-top: 6px;
    margin-bottom: 18px;
  }
  .card-field {
    position: relative;
    margin-bottom: 10px;
  }
  .card-field-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-field-row .card-field {
    flex: 1;
    margin-bottom: 0;
  }
  .card-input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface2);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    letter-spacing: 0.04em;
  }
  .card-input:focus {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(33,150,243,0.12);
    background: #fff;
  }
  .card-input.error {
    border-color: #ff3b30;
    box-shadow: 0 0 0 3px rgba(255,59,48,0.1);
  }
  .card-input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
  }
  .card-input-icon svg {
    width: 18px; height: 18px;
    stroke: currentColor;
    stroke-width: 1.6;
    fill: none;
  }
  .card-network {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    pointer-events: none;
    transition: color 0.2s;
  }
  .card-network.visa   { color: #1a1f71; }
  .card-network.mc    { color: #eb001b; }
  .card-network.amex  { color: #007bc1; }

  .secure-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 500;
  }
  .secure-note svg {
    width: 12px; height: 12px;
    stroke: var(--text-tertiary);
    stroke-width: 2;
    fill: none;
  }

  /* ── Donate Now — outlined, understated ── */
  .donate-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--blue-mid);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.1px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.15s;
  }
  .donate-btn:hover {
    background: #f0f6ff;
    border-color: rgba(33,150,243,0.4);
    transform: translateY(-1px);
  }
  .donate-btn:active {
    transform: translateY(0);
    background: #e6f0ff;
  }

  /* ── Confirm Donation — solid primary ── */
  .confirm-btn {
    width: 100%;
    padding: 14px;
    background: var(--text-primary);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.1px;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.15s;
    margin-top: 4px;
  }
  .confirm-btn:hover {
    opacity: 0.85;
    transform: translateY(-1px);
  }
  .confirm-btn:active {
    transform: translateY(0);
    opacity: 0.75;
  }

  .toast {
    position: absolute; bottom: -56px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: rgba(29,29,31,0.88); backdrop-filter: blur(12px);
    color: #fff; font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 999px; white-space: nowrap;
    opacity: 0; transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
    pointer-events: none; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .complete-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: linear-gradient(135deg,#e3fff0,#d0f7e8); color: #1a8a4a;
    border-radius: 999px; padding: 5px 13px; font-size: 12px; font-weight: 600;
    margin-top: 8px; opacity: 0; transform: scale(0.9);
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .card > *:not(.toast) {
    animation: fadeUp 0.5s ease both;
  }
  .card > *:nth-child(1) { animation-delay: 0.15s; }
  .card > *:nth-child(2) { animation-delay: 0.22s; }
  .card > *:nth-child(3) { animation-delay: 0.29s; }
  .card > *:nth-child(4) { animation-delay: 0.36s; }
  .card > *:nth-child(5) { animation-delay: 0.43s; }
  .card > *:nth-child(6) { animation-delay: 0.50s; }
  .card > *:nth-child(7) { animation-delay: 0.57s; }
  .card > *:nth-child(8) { animation-delay: 0.62s; }
  .card > *:nth-child(9) { animation-delay: 0.67s; }
  .card > *:nth-child(10){ animation-delay: 0.71s; }
    0%   { opacity: 0; transform: translateY(-32px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .card {
    animation: cardDrop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) both;
  }
  .card.glow-gold {
    box-shadow:
      0 8px 40px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.05),
      0 0 22px 7px  rgba(255, 80,  80,  0.20),
      0 0 44px 16px rgba(255, 165, 0,   0.15),
      0 0 66px 24px rgba(60,  200, 80,  0.11),
      0 0 88px 32px rgba(50,  160, 255, 0.08),
      0 0 110px 40px rgba(160, 80, 255, 0.06);
    transition: box-shadow 0.4s ease;
  }

  .excess-pill {
    display: inline-flex;
    align-items: center;
    background: linear-gradient(135deg, #fff8e1, #fff3cd);
    color: #b45309;
    border: 1px solid rgba(180, 83, 9, 0.18);
    border-radius: 999px;
    padding: 3px 9px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    opacity: 0;
    transform: translateY(4px) scale(0.9);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.3,0.64,1);
  }
  .excess-pill.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  /* ── Stripe Card Element container ── */
  #stripe-card-wrap {
    padding: 13px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--surface2);
    transition: border-color 0.18s, box-shadow 0.18s;
    cursor: text;
  }
  #stripe-card-wrap.focused {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(33,150,243,0.12);
    background: #fff;
  }
  #stripe-card-wrap.error {
    border-color: #ff3b30;
    box-shadow: 0 0 0 3px rgba(255,59,48,0.1);
  }
  #stripe-card-errors {
    font-size: 12px;
    color: #ff3b30;
    margin-top: 6px;
    min-height: 16px;
  }
  .payment-error {
    font-size: 12px;
    color: #ff3b30;
    margin-bottom: 10px;
    min-height: 16px;
    text-align: center;
  }
  .confirm-btn.loading {
    opacity: 0.6;
    pointer-events: none;
  }
</style>
<!-- Load Stripe.js from Stripe's CDN — never self-host this -->
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div class="card">

  <h1><span style="color:#E34234;">ULID's</span> Fundraiser!</h1>
  <p class="subtitle">Help support our students and program initiatives.<br>Every contribution makes a difference.</p>

  <div class="stats-row">
    <div class="raised-row">
      <div class="stat-raised" id="raised-display">$0</div>
      <div class="excess-pill" id="excess-pill"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <div class="stat-percent" id="percent-display">0%</div>
      <div class="stat-goal">of $600 goal</div>
    </div>
  </div>

  <div class="progress-outer" id="progress-outer">
    <div class="progress-bar-row">
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <button class="chart-toggle" id="chart-toggle" title="Show chart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </button>
    </div>
    <!-- canvas injected by JS -->
  </div>

  <div class="chart-panel" id="chart-panel">
    <div class="chart-panel-inner">
      <canvas id="donation-chart" height="140"></canvas>
      <div class="chart-legend">
        <div class="legend-item">
          <span class="legend-dot" style="background:#4facfe"></span><span>Raised</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:rgba(33,150,243,0.3)"></span><span>Projected to goal</span>
        </div>
      </div>
    </div>
  </div>

  <div class="donors-row">
    <div class="donors-pill">
      <div class="donors-dot"></div>
      <span class="donors-text" id="donors-text">0 donors</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="input-label">Select Amount</div>
  <div class="amount-grid">
    <button class="preset-btn" data-amt="10">$10</button>
    <button class="preset-btn" data-amt="25">$25</button>
    <button class="preset-btn" data-amt="50">$50</button>
    <button class="preset-btn" data-amt="100">$100</button>
  </div>

  <div class="custom-input-row">
    <div class="input-wrap">
      <span class="currency-sign">$</span>
      <input type="number" id="custom-amount" placeholder="Custom amount" min="1" max="10000" />
    </div>
  </div>

  <button class="donate-btn" id="donate-btn">Donate Now</button>

  <div class="card-slide" id="card-slide">
    <div class="card-slide-inner">
      <div class="divider" style="margin-top:18px;"></div>
      <div class="input-label">Card Details</div>

      <div class="card-section">
        <!-- Cardholder name (plain input — fine to keep) -->
        <div class="card-field">
          <div class="card-input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <input class="card-input" id="card-name" type="text" placeholder="Cardholder name" autocomplete="cc-name" maxlength="40" />
        </div>

        <!-- Stripe CardElement mounts here -->
        <div class="card-field" id="stripe-card-wrap">
          <div id="stripe-card-element"></div>
          <div id="stripe-card-errors" role="alert"></div>
        </div>
      </div>

      <div id="payment-error" class="payment-error"></div>
      <button class="confirm-btn" id="confirm-btn">Confirm Donation</button>
      <div class="secure-note">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Secured by Stripe · 256-bit encryption
      </div>
    </div>
  </div>

  <div class="toast" id="toast">🎉 Thank you for your donation!</div>
</div>

<script>
(function () {
  const GOAL = 600;
  const BAR_H = 14;

  let raised     = 0;
  let currentPct = 0;
  let donors     = 0;
  let selectedAmt = null;

  const raisedEl   = document.getElementById('raised-display');
  const pctEl      = document.getElementById('percent-display');
  const fillEl     = document.getElementById('progress-fill');
  const trackEl    = document.getElementById('progress-track');
  const outerEl    = document.getElementById('progress-outer');
  const donorsEl   = document.getElementById('donors-text');
  const toastEl    = document.getElementById('toast');
  const badgeEl    = document.getElementById('complete-badge');
  const excessEl   = document.getElementById('excess-pill');
  const customEl   = document.getElementById('custom-amount');

  // ── Load real totals from the database on page load ──────────────
  async function loadStats() {
    try {
      const res  = await fetch('/stats');
      const data = await res.json();
      if (data.total && data.total > 0) {
        const serverTotal  = Math.min(data.total, GOAL);
        const serverDonors = data.donors || 0;
        raised        = serverTotal;
        totalUncapped = data.total;
        donors        = serverDonors;

        // Snap bar and counters to real values (no animation on load)
        currentPct = (serverTotal / GOAL) * 100;
        fillEl.style.width   = currentPct + '%';
        pctEl.textContent    = Math.round(currentPct) + '%';
        raisedEl.textContent = '$' + Math.round(serverTotal);
        donorsEl.textContent = serverDonors + (serverDonors === 1 ? ' donor' : ' donors');

        if (serverTotal >= GOAL) badgeEl.classList.add('show');
        if (data.total > GOAL) {
          excessEl.textContent = '+$' + Math.round(data.total - GOAL) + ' 🙏';
          excessEl.classList.add('show');
        }
      }
    } catch (err) {
      console.warn('Could not load stats — running in offline mode.');
    }
  }
  loadStats();
  setInterval(loadStats, 5000);

  // ── Chart ─────────────────────────────────────────────────────────
  const chartPanel  = document.getElementById('chart-panel');
  const chartToggle = document.getElementById('chart-toggle');
  const chartCanvas = document.getElementById('donation-chart');
  const chartCtx    = chartCanvas.getContext('2d');

  chartToggle.addEventListener('click', () => {
    const isOpen = chartPanel.classList.contains('open');
    if (!isOpen) {
      // Opening: draw first, then measure and animate to exact height
      chartPanel.style.height = 'auto';
      drawChart();
      const fullH = chartPanel.scrollHeight;
      chartPanel.style.height = '0';
      chartPanel.classList.add('open');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          chartPanel.style.height = fullH + 'px';
        });
      });
      chartToggle.classList.add('active');
    } else {
      // Closing: lock to current height first, then animate to 0
      chartPanel.style.height = chartPanel.scrollHeight + 'px';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          chartPanel.style.height = '0';
          chartPanel.classList.remove('open');
        });
      });
      chartToggle.classList.remove('active');
    }
  });

  function drawChart() {
    const W = chartCanvas.offsetWidth;
    const H = 140;
    chartCanvas.width  = W * window.devicePixelRatio;
    chartCanvas.height = H * window.devicePixelRatio;
    chartCanvas.style.width  = W + 'px';
    chartCanvas.style.height = H + 'px';
    chartCtx.scale(window.devicePixelRatio, window.devicePixelRatio);

    const pad = { top: 16, right: 20, bottom: 34, left: 46 };
    const gW = W - pad.left - pad.right;
    const gH = H - pad.top  - pad.bottom;

    chartCtx.clearRect(0, 0, W, H);

    const raisedRatio = Math.min(raised / GOAL, 1);
    const splitPoint  = raisedRatio;

    const px = x => pad.left + x * gW;
    const py = y => pad.top  + (1 - y) * gH;

    // Grid lines + Y labels
    chartCtx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = py(i / 4);
      chartCtx.strokeStyle = 'rgba(0,0,0,0.06)';
      chartCtx.beginPath();
      chartCtx.moveTo(pad.left, y);
      chartCtx.lineTo(pad.left + gW, y);
      chartCtx.stroke();

      chartCtx.fillStyle = 'rgba(0,0,0,0.32)';
      chartCtx.font = `500 11px -apple-system, sans-serif`;
      chartCtx.textAlign = 'right';
      chartCtx.fillText('$' + Math.round((i / 4) * GOAL), pad.left - 8, y + 4);
    }

    // ── Projection area ───────────────────────────────────────────
    chartCtx.beginPath();
    chartCtx.moveTo(px(splitPoint), py(raisedRatio));
    chartCtx.lineTo(px(1), py(1));
    chartCtx.lineTo(px(1), py(0));
    chartCtx.lineTo(px(splitPoint), py(0));
    chartCtx.closePath();
    const projGrad = chartCtx.createLinearGradient(0, py(1), 0, py(0));
    projGrad.addColorStop(0, 'rgba(33,150,243,0.0)');
    projGrad.addColorStop(1, 'rgba(33,150,243,0.12)');
    chartCtx.fillStyle = projGrad;
    chartCtx.fill();

    chartCtx.beginPath();
    chartCtx.setLineDash([5, 4]);
    chartCtx.strokeStyle = 'rgba(33,150,243,0.4)';
    chartCtx.lineWidth = 1.5;
    chartCtx.moveTo(px(splitPoint), py(raisedRatio));
    chartCtx.lineTo(px(1), py(1));
    chartCtx.stroke();
    chartCtx.setLineDash([]);

    // ── Raised area ───────────────────────────────────────────────
    chartCtx.beginPath();
    chartCtx.moveTo(px(0), py(0));
    chartCtx.lineTo(px(splitPoint), py(raisedRatio));
    chartCtx.lineTo(px(splitPoint), py(0));
    chartCtx.closePath();
    const raisedGrad = chartCtx.createLinearGradient(0, py(raisedRatio), 0, py(0));
    raisedGrad.addColorStop(0, 'rgba(79,172,254,0.0)');
    raisedGrad.addColorStop(1, 'rgba(79,172,254,0.2)');
    chartCtx.fillStyle = raisedGrad;
    chartCtx.fill();

    chartCtx.beginPath();
    chartCtx.strokeStyle = '#4facfe';
    chartCtx.lineWidth = 2;
    chartCtx.moveTo(px(0), py(0));
    chartCtx.lineTo(px(splitPoint), py(raisedRatio));
    chartCtx.stroke();

    // Dot at current position
    chartCtx.beginPath();
    chartCtx.arc(px(splitPoint), py(raisedRatio), 5, 0, Math.PI * 2);
    chartCtx.fillStyle = '#4facfe';
    chartCtx.fill();
    chartCtx.strokeStyle = '#fff';
    chartCtx.lineWidth = 2;
    chartCtx.stroke();

    // X axis labels
    chartCtx.fillStyle = 'rgba(0,0,0,0.32)';
    chartCtx.font = `500 11px -apple-system, sans-serif`;
    chartCtx.textAlign = 'center';
    chartCtx.fillText('$0',   px(0),   H - 10);
    chartCtx.fillText('$300', px(0.5), H - 10);
    chartCtx.fillText('Goal', px(1),   H - 10);
  }

  // Redraw chart on donation


  // ── Create & size the canvas — covers the full card ──────────────
  const cardEl = document.querySelector('.card');
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  canvas.style.position = 'absolute';
  canvas.style.pointerEvents = 'none';
  canvas.style.zIndex = '100';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.borderRadius = '28px';
  cardEl.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  function sizeCanvas() {
    canvas.width  = cardEl.offsetWidth;
    canvas.height = cardEl.offsetHeight;
    canvas.style.width  = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
  }
  window.addEventListener('resize', sizeCanvas);
  requestAnimationFrame(sizeCanvas);

  // Returns the Y centre of the bar in card-relative coords
  function barCentreY() {
    const cardRect  = cardEl.getBoundingClientRect();
    const trackRect = trackEl.getBoundingClientRect();
    return trackRect.top - cardRect.top + BAR_H / 2;
  }

  // Returns the left edge X of the bar track in card-relative coords
  function barLeftX() {
    const cardRect  = cardEl.getBoundingClientRect();
    const trackRect = trackEl.getBoundingClientRect();
    return trackRect.left - cardRect.left;
  }

  const cardNameEl = document.getElementById('card-name');
  const cardSlide  = document.getElementById('card-slide');
  const payErrEl   = document.getElementById('payment-error');
  let pendingAmount = null;
  let stripeCardComplete = false;

  // ── Init Stripe ───────────────────────────────────────────────────
  // IMPORTANT: replace with your real publishable key from .env
  const stripe   = Stripe('pk_live_51T76NIFnedwbcHYCH3Q5tgQotkVKVgod6GDeYeRLchCADbgtHEyeSmom8OTSefjfDz1U4P03Azq7asZduBDRi4xc00ZNEy8iGu');
  const elements = stripe.elements();

  const cardElement = elements.create('card', {
    style: {
      base: {
        fontFamily: '-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif',
        fontSize: '15px',
        fontWeight: '500',
        color: '#1d1d1f',
        letterSpacing: '0.02em',
        '::placeholder': { color: '#aeaeb2' },
      },
      invalid: { color: '#ff3b30', iconColor: '#ff3b30' },
    },
  });
  cardElement.mount('#stripe-card-element');

  cardElement.on('focus',  () => document.getElementById('stripe-card-wrap').classList.add('focused'));
  cardElement.on('blur',   () => document.getElementById('stripe-card-wrap').classList.remove('focused'));
  cardElement.on('change', (e) => {
    const wrap = document.getElementById('stripe-card-wrap');
    const errEl = document.getElementById('stripe-card-errors');
    stripeCardComplete = e.complete;
    if (e.error) {
      errEl.textContent = e.error.message;
      wrap.classList.add('error');
    } else {
      errEl.textContent = '';
      wrap.classList.remove('error');
    }
  });

  cardNameEl.addEventListener('input', () => cardNameEl.classList.remove('error'));

  // ── Preset buttons ────────────────────────────────────────────────
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedAmt = parseFloat(btn.dataset.amt);
      customEl.value = '';
    });
  });
  customEl.addEventListener('input', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    selectedAmt = null;
  });

  // ── "Donate Now" — validate amount, slide open card panel ─────────
  document.getElementById('donate-btn').addEventListener('click', () => {
    const amount = selectedAmt ?? parseFloat(customEl.value);
    if (!amount || amount <= 0) {
      customEl.focus();
      customEl.style.borderColor = '#ff3b30';
      setTimeout(() => customEl.style.borderColor = '', 800);
      return;
    }
    pendingAmount = amount;
    payErrEl.textContent = '';
    cardSlide.classList.add('open');
    setTimeout(() => {
      document.getElementById('confirm-btn').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 460);
  });

  // ── "Confirm Donation" — charge via Stripe ────────────────────────
  document.getElementById('confirm-btn').addEventListener('click', async () => {
    if (!pendingAmount || pendingAmount <= 0) return;

    const name = cardNameEl.value.trim();
    if (name.length < 2) {
      cardNameEl.classList.add('error');
      return;
    }
    if (!stripeCardComplete) {
      document.getElementById('stripe-card-wrap').classList.add('error');
      return;
    }

    const confirmBtn = document.getElementById('confirm-btn');
    confirmBtn.classList.add('loading');
    confirmBtn.textContent = 'Processing…';
    payErrEl.textContent = '';

    try {
      // 1. Ask backend to create a PaymentIntent
      const res = await fetch('/create-payment-intent', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ amount: pendingAmount }),
      });
      const { clientSecret, error: serverError } = await res.json();
      if (serverError) throw new Error(serverError);

      // 2. Confirm the payment with Stripe
      const { paymentIntent: confirmedIntent, error: stripeError } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: {
          card:            cardElement,
          billing_details: { name },
        },
      });
      if (stripeError) throw new Error(stripeError.message);

      // 3. Tell our backend to mark the donation as succeeded in the DB
      const confirmRes  = await fetch('/confirm-donation', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ paymentIntentId: confirmedIntent.id }),
      });
      const confirmData = await confirmRes.json();
      if (confirmData.error) throw new Error(confirmData.error);

      // ── Success — use server totals as source of truth ────────────
      const amount       = pendingAmount;
      const wasAtGoal    = raised >= GOAL;
      const prevRaised   = raised;
      const prevUncapped = totalUncapped;

      // Sync to real DB values if available, else update locally
      if (confirmData.total !== undefined) {
        totalUncapped = confirmData.total;
        raised        = Math.min(confirmData.total, GOAL);
        donors        = confirmData.donors;
      } else {
        raised        = Math.min(raised + amount, GOAL);
        totalUncapped += amount;
        donors++;
      }

      animateCounter(prevRaised, raised);
      animateExcess(prevUncapped - GOAL, totalUncapped - GOAL);
      if (!wasAtGoal) animateBar(currentPct, (raised / GOAL) * 100);
      if (totalUncapped >= GOAL) startRain();
      showToast();
      triggerGlow();
      triggerCardGlow();
      if (chartPanel.classList.contains('open')) drawChart();

      // Reset form
      cardSlide.classList.remove('open');
      pendingAmount = null;
      selectedAmt   = null;
      customEl.value = '';
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      cardNameEl.value = '';
      cardElement.clear();

    } catch (err) {
      payErrEl.textContent = err.message;
    } finally {
      confirmBtn.classList.remove('loading');
      confirmBtn.textContent = 'Confirm Donation';
    }
  });

  // ── Counter ───────────────────────────────────────────────────────
  function animateCounter(from, to) {
    const dur = 900, t0 = performance.now();
    const exceeded = totalUncapped >= GOAL;

    if (!exceeded) {
      raisedEl.classList.add('flash');
      setTimeout(() => raisedEl.classList.remove('flash'), 700);
    } else {
      triggerGoldenPop();
    }
    donorsEl.textContent = donors + (donors === 1 ? ' donor' : ' donors');
    (function tick(now) {
      const t = Math.min((now - t0) / dur, 1);
      raisedEl.textContent = '$' + Math.round(from + (to - from) * easeOutCubic(t));
      if (t < 1) requestAnimationFrame(tick);
      else {
        raisedEl.textContent = '$' + to.toFixed(0);
        if (to >= GOAL) {
          badgeEl.classList.add('show');
        }
      }
    })(performance.now());
  }

  // ── Excess pill ───────────────────────────────────────────────────
  let totalUncapped = 0;
  let excessRaf = null;

  function animateExcess(fromExcess, toExcess) {
    if (toExcess <= 0) return;
    excessEl.classList.add('show');
    if (excessRaf) cancelAnimationFrame(excessRaf);

    const dur = 900, t0 = performance.now();
    const safeFrom = Math.max(fromExcess, 0);

    (function tick(now) {
      const t = Math.min((now - t0) / dur, 1);
      const val = safeFrom + (toExcess - safeFrom) * easeOutCubic(t);
      excessEl.textContent = '+$' + Math.round(val) + ' 🙏';
      if (t < 1) excessRaf = requestAnimationFrame(tick);
      else {
        excessEl.textContent = '+$' + Math.round(toExcess) + ' 🙏';
        excessRaf = null;
      }
    })(performance.now());
  }

  // ── Bar animation + confetti emitter ─────────────────────────────
  let barRaf = null;
  let renderRaf = null;
  let particles = [];
  let currentTipX = 0; // live pixel position of the bar tip

  function animateBar(fromPct, toPct) {
    if (barRaf) cancelAnimationFrame(barRaf);
    sizeCanvas();   // refresh dimensions before animating

    const dur = 900, t0 = performance.now();

    function frame(now) {
      const t    = Math.min((now - t0) / dur, 1);
      const ease = easeOutBack(t);
      const pct  = clamp(fromPct + (toPct - fromPct) * ease, 0, 100);

      // Move the fill
      fillEl.style.width = pct + '%';
      pctEl.textContent  = Math.round(pct) + '%';
      currentPct = pct;

      // Tip pixel position in card-canvas coords
      const tipX = barLeftX() + (pct / 100) * trackEl.offsetWidth;
      const tipY = barCentreY();
      currentTipX = barLeftX() + (currentPct / 100) * trackEl.offsetWidth;

      // Emit particles along the curved cap — only while bar not yet full
      if (t < 1 && tipX > 4 && toPct < 100) {
        if (Math.random() < 0.5) spawnOnCap(tipX, tipY);
      }

      if (t < 1) {
        barRaf = requestAnimationFrame(frame);
      } else {
        barRaf = null;
        // Small final pop only if we didn't just hit 100%
        if (toPct < 100) {
          const finalX = barLeftX() + (toPct / 100) * trackEl.offsetWidth;
          for (let i = 0; i < 4; i++) spawnOnCap(finalX, barCentreY());
        }
      }
    }

    barRaf = requestAnimationFrame(frame);
    if (!renderRaf) renderLoop();
  }

  // ── Rain mode — falls from above when goal is exceeded ───────────

  function startRain() {
    sizeCanvas();
    if (!renderRaf) renderLoop();

    const DURATION = 2800;
    const start = performance.now();

    // Each call spawns its own independent rain burst — no cancellation
    function rainFrame(now) {
      const elapsed = now - start;
      if (elapsed > DURATION) return;

      if (Math.random() < 0.35) spawnRainDrop();

      requestAnimationFrame(rainFrame);
    }
    requestAnimationFrame(rainFrame);
  }

  function spawnRainDrop() {
    const x = Math.random() * canvas.width;
    particles.push({
      x,
      y: -10,
      vx: (Math.random() - 0.5) * 0.8,
      vy: 0.6 + Math.random() * 1.2,
      size:     3 + Math.random() * 4,
      color:    COLORS[Math.random() * COLORS.length | 0],
      rot:      Math.random() * Math.PI * 2,
      rotV:     (Math.random() - 0.5) * 0.1,
      shape:    Math.random() < 0.55 ? 'rect' : 'circle',
      gravity:  0.012 + Math.random() * 0.01,
      drag:     0.995,
      life:     1.0,
      decay:    0.004 + Math.random() * 0.004,
      isRain:   true
    });
  }

  // ── Spawn along the curved right cap of the fill ─────────────────
  // The fill has border-radius 999px, so its right edge is a semicircle
  // with radius = BAR_H/2 = 7px, centred at (tipX - r, barCentreY).
  function spawnOnCap(tipX, tipY) {
    const r = BAR_H / 2;               // 7 px — cap circle radius
    const cx = tipX - r;               // centre of the cap circle
    // Pick a random angle biased toward the upper semicircle (−90° ± 70°)
    const angle = (-Math.PI / 2) + (Math.random() * 2 - 1) * (Math.PI / 180) * 70;
    const ex = cx + Math.cos(angle) * r;   // point on the cap edge
    const ey = tipY + Math.sin(angle) * r;
    // Launch outward from the cap surface (normal = angle itself)
    spawn(ex, ey, angle);
  }

  // ── Particle factory ──────────────────────────────────────────────
  const COLORS = [
    '#FF595E','#FF924C','#FFCA3A','#6BCB77','#4D96FF',
    '#C77DFF','#FF6B9D','#56CFE1','#FFC300','#FF5733'
  ];

  function spawn(x, y, baseAngle) {
    // If a base angle is given (from cap normal), spread ±40° around it
    // Otherwise use the old upward cone
    const spread = (Math.PI / 180) * 40;
    const angle  = baseAngle !== undefined
      ? baseAngle + (Math.random() * 2 - 1) * spread
      : -Math.PI / 2 + (Math.random() * 2 - 1) * (Math.PI / 180) * 50;
    const speed  = 0.8 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size:     2.5 + Math.random() * 6,
      color:    COLORS[Math.random() * COLORS.length | 0],
      rot:      Math.random() * Math.PI * 2,
      rotV:     (Math.random() - 0.5) * 0.3,
      shape:    Math.random() < 0.55 ? 'rect' : 'circle',
      gravity:  0.04 + Math.random() * 0.04,
      drag:     0.975,
      life:     1.0,
      decay:    0.013 + Math.random() * 0.013
    });
  }

  // ── Render loop ───────────────────────────────────────────────────
  function renderLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);

    for (const p of particles) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += p.gravity;
      p.vx  *= p.drag;
      p.rot += p.rotV;
      p.life -= p.decay;

      // Don't render particles that have drifted behind the bar tip
      // (rain drops are exempt — they fall freely)
      if (!p.isRain && p.x < currentTipX - BAR_H / 2) continue;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    if (particles.length > 0 || barRaf) {
      renderRaf = requestAnimationFrame(renderLoop);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      renderRaf = null;
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────
  function showToast() {
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 1500);
  }

  // ── Golden pop effect ─────────────────────────────────────────────
  function triggerGoldenPop() {
    raisedEl.classList.remove('golden');
    void raisedEl.offsetWidth;
    raisedEl.classList.add('golden');
    setTimeout(() => raisedEl.classList.remove('golden'), 950);
  }

  // ── Glow ──────────────────────────────────────────────────────────
  function triggerGlow() {
    fillEl.classList.remove('glow');
    void fillEl.offsetWidth;
    fillEl.classList.add('glow');
    setTimeout(() => fillEl.classList.remove('glow'), 1600);
  }

  function triggerCardGlow() {
    cardEl.classList.add('glow-gold');
    clearTimeout(cardEl._glowTimeout);
    cardEl._glowTimeout = setTimeout(() => {
      cardEl.classList.remove('glow-gold');
    }, 1400); // hold, then transition fades it out over 0.5s
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeOutBack(t) {
    const c = 1.70158 + 1;
    return 1 + c * Math.pow(t - 1, 3) + (c - 1) * Math.pow(t - 1, 2);
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
})();
</script>
